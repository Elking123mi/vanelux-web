[build]
  command = """
    rm -rf flutter && \
    git clone https://github.com/flutter/flutter.git -b stable --depth 1 && \
    export PATH="$PATH:`pwd`/flutter/bin" && \
    flutter config --enable-web && \
    flutter pub get && \
    flutter build web --release --dart-define=GOOGLE_MAPS_API_KEY=$GOOGLE_MAPS_API_KEY --dart-define=TOLLGURU_API_KEY=$TOLLGURU_API_KEY
  """
  publish = "build/web"
  functions = "netlify/functions"

[build.environment]
  FLUTTER_VERSION = "stable"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

# Redirect /api/chat to the Netlify Function
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

# Redirect /api/tolls to the Netlify Function
[[redirects]]
  from = "/api/tolls"
  to = "/.netlify/functions/tolls"
  status = 200
  force = true

# SPA fallback so routes like /gracias load Flutter web correctly.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
